views:
  v1/pods:
    columns:
      - NAMESPACE
      - NAME
      - AGE
      - IP

  v1/pods@default:
    columns:
      - NAME
      - IP
      - AGE

  v1/pods@ns*:
    columns:
      - AGE
      - NAME
      - IP

  bozo:
    columns:
      - DUH
      - BLAH
      - BLEE

  v1/services@context:prod-cluster:
    columns:
      - NAME
      - TYPE
      - CLUSTER-IP

  v1/pods@context:production:
    columns:
      - NAMESPACE
      - NAME
      - READY
      - STATUS

  v1/pods@kube-system@context:production:
    columns:
      - NAME
      - NODE
      - STATUS
      - AGE
